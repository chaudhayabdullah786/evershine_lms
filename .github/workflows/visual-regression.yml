name: Visual Regression - Documents Export

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    env:
      # WHY stub: `next build` only imports modules — no real DB call is made
      # thanks to the lazy-Proxy Prisma client. The stub satisfies any format
      # validators that execute before the Proxy defers instantiation.
      DATABASE_URL: mysql://ci_user:ci_password@localhost:3306/lms_ci
      NEXTAUTH_SECRET: ci-test-secret-min-32-chars-long!!
      NEXTAUTH_URL: http://localhost:5000
      CRON_SECRET: ci-cron-secret
      NEXT_PUBLIC_APP_URL: http://localhost:5000
      NEXT_PUBLIC_APP_NAME: Evershaheen Academy LMS
      NEXT_PUBLIC_ACADEMIC_ENGINE_PRIMARY: 'true'
      NEXT_PUBLIC_ENABLE_EXPORT_SMOKE: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Start server
        # WHY: node server.js (not npm run start) is used explicitly so that the
        # required env vars below are visible during server startup validation.
        # server.js validates DATABASE_URL, NEXTAUTH_SECRET, NEXTAUTH_URL on launch.
        env:
          DATABASE_URL: mysql://ci_user:ci_password@localhost:3306/lms_ci
          NEXTAUTH_SECRET: ci-test-secret-min-32-chars-long!!
          NEXTAUTH_URL: http://localhost:5000
          NODE_ENV: production
          PORT: '5000'
        run: node server.js &

      - name: Wait for server
        # WHY curl over nc: nc checks raw TCP connection (port open) but the server
        # may still be initialising and return nothing. curl validates HTTP 200/307
        # which means Next.js is fully ready to serve requests.
        run: |
          for i in $(seq 1 60); do
            status=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:5000/login || true)
            if echo "$status" | grep -qE '200|307'; then
              echo "Server up (HTTP $status)"
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start within 120 s"
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright visual tests
        timeout-minutes: 10
        run: npx playwright test --config=playwright.config.ts

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-artifacts/**
