name: Visual Regression - Documents Export

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    env:
      # WHY stub: `next build` only imports modules — no real DB call is made
      # thanks to the lazy-Proxy Prisma client. The stub satisfies any format
      # validators that execute before the Proxy defers instantiation.
      DATABASE_URL: mysql://ci_user:ci_password@localhost:3306/lms_ci
      NEXTAUTH_SECRET: ci-test-secret-min-32-chars-long!!
      NEXTAUTH_URL: http://localhost:5000
      CRON_SECRET: ci-cron-secret
      NEXT_PUBLIC_APP_URL: http://localhost:5000
      NEXT_PUBLIC_APP_NAME: Evershaheen Academy LMS
      NEXT_PUBLIC_ACADEMIC_ENGINE_PRIMARY: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Start server
        run: PORT=5000 npm run start &

      - name: Wait for server
        run: |
          n=0
          until nc -z localhost 5000 || [ $n -ge 30 ]; do
            n=$((n+1))
            sleep 1
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright visual tests
        run: npx playwright test --config=playwright.config.ts

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: test-artifacts/**
